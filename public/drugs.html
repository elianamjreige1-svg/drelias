<!DOCTYPE html>
<html>
<head>
<title>Drugs Management</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial;
    background:#1e3c72;
    margin:0;
    padding:10px;
    color:white;
}

h1{
    text-align:center;
}

/* ===== ADD FORM ===== */
.formBox{
    background:white;
    color:black;
    width:95%;
    max-width:900px;
    margin:20px auto;
    padding:15px;
    border-radius:8px;
    box-sizing:border-box;
}

.formBox input{
    width:100%;
    padding:12px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

.formBox button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

.formBox button:hover{
    opacity:0.9;
}

/* ===== SEARCH ===== */
.searchBox{
    width:95%;
    max-width:900px;
    margin:10px auto;
}

.searchBox input{
    width:100%;
    padding:12px;
    border-radius:6px;
    border:none;
    box-sizing:border-box;
}

/* ===== TABLE ===== */
.table-container{
    overflow-x:auto;
    width:95%;
    max-width:900px;
    margin:20px auto;
}

table{
    width:100%;
    min-width:750px;
    background:white;
    color:black;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

/* INPUTS INSIDE TABLE */
td input{
    width:95%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
    text-align:center;
}

/* ===== ACTION BUTTONS (IMPORTANT FIX) ===== */
.actions{
    display:flex;
    flex-direction:row;
    flex-wrap:nowrap;
    justify-content:center;
    gap:6px;
    align-items:center;
}

.actions button{
    padding:6px 10px;
    font-size:12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    white-space:nowrap;
}

.saveBtn{
    background:#4CAF50;
}

.deleteBtn{
    background:#e53935;
}

/* ===== MOBILE ===== */
@media (max-width:768px){

    table{
        min-width:650px;
    }

    .actions{
        flex-wrap:wrap;
    }

    .actions button{
        width:auto;
        flex:1;
    }
}

</style>
</head>

<body>

<h1>Drugs Management</h1>

<!-- ADD DRUG FORM -->
<div class="formBox">

    <h2>Add New Drug</h2>

    <input id="name" placeholder="Drug Name">
    <input id="qty" type="number" placeholder="Quantity in Stock">
    <input id="price" type="number" placeholder="Unit Price ($)">

    <button onclick="addDrug()">Add Drug</button>

</div>

<!-- SEARCH -->
<div class="searchBox">
    <input id="search" placeholder="Search drug..." onkeyup="loadDrugs()">
</div>

<!-- TABLE -->
<div class="table-container">
    <table id="drugsTable"></table>
</div>

<script>

// ===== LOAD DRUGS =====
function loadDrugs(){

    let q = document.getElementById("search").value;

    fetch("/drugs?name=" + q)
    .then(r => r.json())
    .then(data => {

        let html = `
        <tr>
            <th>Name</th>
            <th>Qty</th>
            <th>Price ($)</th>
            <th>Actions</th>
        </tr>
        `;

        data.forEach(d => {

            html += `
            <tr>

                <td>
                    <input id="name${d.id}" value="${d.name}">
                </td>

                <td>
                    <input id="qty${d.id}" type="number" value="${d.quantity}">
                </td>

                <td>
                    <input id="price${d.id}" type="number" value="${d.price}">
                </td>

                <td class="actions">

                    <button class="saveBtn" onclick="saveDrug(${d.id})">
                        Save Info
                    </button>

                    <button class="deleteBtn" onclick="deleteDrug(${d.id})">
                        Delete
                    </button>

                </td>

            </tr>
            `;
        });

        document.getElementById("drugsTable").innerHTML = html;

    });

}

// ===== ADD DRUG =====
function addDrug(){

    let name = document.getElementById("name").value;
    let qty = document.getElementById("qty").value;
    let price = document.getElementById("price").value;

    if(!name || !qty || !price){
        alert("Please fill all fields");
        return;
    }

    fetch("/drugs",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            name,
            quantity:qty,
            price
        })
    })
    .then(() => {

        document.getElementById("name").value="";
        document.getElementById("qty").value="";
        document.getElementById("price").value="";

        loadDrugs();

    });

}

// ===== SAVE DRUG =====
function saveDrug(id){

    let name = document.getElementById("name"+id).value;
    let qty = document.getElementById("qty"+id).value;
    let price = document.getElementById("price"+id).value;

    if(!name || !qty || !price){
        alert("Please fill all fields");
        return;
    }

    if(!confirm("Save changes for this drug?")) return;

    fetch("/drugs/"+id,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            name,
            quantity:qty,
            price
        })
    })
    .then(loadDrugs);

}

// ===== DELETE DRUG =====
function deleteDrug(id){

    if(!confirm("Delete this drug?")) return;

    fetch("/drugs/"+id,{
        method:"DELETE"
    })
    .then(loadDrugs);

}

// INIT
loadDrugs();

</script>

</body>
</html>
