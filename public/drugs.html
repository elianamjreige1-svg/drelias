<!DOCTYPE html>
<html>
<head>
<title>Drugs Management</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial;
    background:#1e3c72;
    margin:0;
    padding:10px;
    color:white;
}

/* ===== FORM CARD (same as modal style) ===== */
.modalContent{
    background:white;
    color:black;
    width:95%;
    max-width:900px;
    margin:20px auto;
    padding:15px;
    box-sizing:border-box;
    border-radius:8px;
}

.modalContent input{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:15px;
}

.modalContent button{
    padding:12px 16px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    background:#4CAF50;
    color:white;
    width:100%;
}

.modalContent button:hover{
    opacity:0.9;
}

/* ===== TABLE ===== */
.table-container{
    overflow-x:auto;
    width:95%;
    max-width:900px;
    margin:20px auto;
}

table{
    width:100%;
    min-width:700px;
    background:white;
    color:black;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

/* action buttons */
.actions button{
    width:auto;
    padding:6px 10px;
    margin:2px;
    font-size:12px;
}

.actions{
    display:flex;
    justify-content:center;
    gap:5px;
    flex-wrap:wrap;
}

/* ===== SEARCH ===== */
.searchBox{
    width:95%;
    max-width:900px;
    margin:10px auto;
}

.searchBox input{
    width:100%;
    padding:12px;
    border-radius:6px;
    border:none;
    box-sizing:border-box;
}

/* ===== MOBILE ===== */
@media (max-width:768px){

    table{
        min-width:600px;
    }

    .actions{
        flex-direction:column;
    }

    .actions button{
        width:100%;
    }
}

</style>
</head>

<body>

<h1 style="text-align:center;">Drugs Management</h1>

<!-- ADD / EDIT DRUG -->
<div class="modalContent">

    <h2>Add / Edit Drug</h2>

    <input id="name" placeholder="Drug Name">
    <input id="qty" type="number" placeholder="Quantity in Stock">
    <input id="price" type="number" placeholder="Unit Price">

    <button onclick="saveDrug()">Save Drug</button>

</div>

<!-- SEARCH -->
<div class="searchBox">
    <input id="search" placeholder="Search drug..." onkeyup="loadDrugs()">
</div>

<!-- TABLE -->
<div class="table-container">
    <table id="drugsTable"></table>
</div>

<script>

let editingId = null;

// LOAD DRUGS
function loadDrugs(){

    let q = document.getElementById("search").value;

    fetch("/drugs?name=" + q)
    .then(r=>r.json())
    .then(data=>{

        let html = `
        <tr>
            <th>Name</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        `;

        data.forEach(d=>{

            html += `
            <tr>
                <td>${d.name}</td>
                <td>${d.quantity}</td>
                <td>$${Number(d.price).toFixed(2)}</td>
                <td class="actions">

                    <button onclick="editDrug(${d.id},'${d.name}',${d.quantity},${d.price})">
                        Edit
                    </button>

                    <button onclick="deleteDrug(${d.id})" style="background:#e53935;color:white;">
                        Delete
                    </button>

                </td>
            </tr>
            `;
        });

        document.getElementById("drugsTable").innerHTML = html;

    });

}

// SAVE DRUG
function saveDrug(){

    let name = document.getElementById("name").value;
    let qty = document.getElementById("qty").value;
    let price = document.getElementById("price").value;

    if(!name || !qty || !price){
        alert("Please fill all fields");
        return;
    }

    let url = editingId ? "/drugs/" + editingId : "/drugs";
    let method = editingId ? "PUT" : "POST";

    fetch(url,{
        method:method,
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            name,
            quantity:qty,
            price
        })
    })
    .then(()=>{

        document.getElementById("name").value="";
        document.getElementById("qty").value="";
        document.getElementById("price").value="";

        editingId = null;

        loadDrugs();

    });

}

// EDIT DRUG
function editDrug(id,name,qty,price){

    editingId = id;

    document.getElementById("name").value = name;
    document.getElementById("qty").value = qty;
    document.getElementById("price").value = price;

}

// DELETE DRUG
function deleteDrug(id){

    if(!confirm("Delete this drug?")) return;

    fetch("/drugs/"+id,{
        method:"DELETE"
    })
    .then(loadDrugs);

}

// INIT
loadDrugs();

</script>

</body>
</html>
