.action-buttons{

.action-buttons button{

placeholder="Search using number, name, dob, telephone"

<script>

let allDrugs = [];
let invoiceItems = [];
let selectedPatientName = "";
    
let allPatients = [];

function renderPatients(data){

    let html = `
    <tr>
        <th>Patient Number</th>
        <th>Patient Name</th>
        <th>DOB</th>
        <th>Telephone</th>
        <th>Actions</th>
    </tr>
    `;

    data.forEach(p => {

        html += `
        <tr>

            <td>${p.id}</td>

            <td>
                <input id="name${p.id}" value="${p.name}">
            </td>

            <td>
                <input id="dob${p.id}" value="${p.dob}">
            </td>

            <td>
                <input id="tel${p.id}" value="${p.tel}">
            </td>

           <td>
    <div class="action-buttons">
        <button onclick="drugandinvoice(${p.id},'${p.name}')" style="background:black">Drug & Invoice</button>
        <button onclick="updatePatient(${p.id})">Save Info</button>
        <button class="deleteBtn" onclick="deletePatient(${p.id})">Delete</button>
    </div>
</td>

        </tr>
        `;
    });

    document.getElementById("patients").innerHTML = html;
}

function loadPatients(){

    fetch("/patients")
    .then(res => res.json())
    .then(data => {

        allPatients = data;

        renderPatients(data);

    });
}

function addPatient(){
if(document.getElementById("name").value=="" || document.getElementById("dob").value=="" || document.getElementById("tel").value==""){
    alert("Please fill all the fields");
    return;
}
    if(confirm("Add this patient?")){

        fetch("/patients",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:document.getElementById("name").value,

                dob:document.getElementById("dob").value,

                tel:document.getElementById("tel").value

            })

        })
        .then(() => {

            document.getElementById("name").value = "";
            document.getElementById("dob").value = "";
            document.getElementById("tel").value = "";

            loadPatients();

        });

    }

}

function updatePatient(id){

    if(confirm("Update this patient?")){

        fetch("/patients/"+id,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:document.getElementById("name"+id).value,

                dob:document.getElementById("dob"+id).value,

                tel:document.getElementById("tel"+id).value

            })

        })
        .then(loadPatients);

    }

}

function deletePatient(id){

    if(confirm("Delete this patient?")){

        fetch("/patients/"+id,{
            method:"DELETE"
        })
        .then(loadPatients);

    }

}

function filterPatients(){

    let value = document.getElementById("searchAll").value.toLowerCase();

    let filtered = allPatients.filter(p => {

        return (
            p.id.toString().includes(value) ||
            (p.name || "").toLowerCase().includes(value) ||
            (p.dob || "").toLowerCase().includes(value) ||
            (p.tel || "").toString().includes(value)
        );

    });

    renderPatients(filtered);
}

loadPatients();


    function drugandinvoice(id,name){

    selectedPatientName = name;

    invoiceItems = [];

    document.getElementById("invoicePatient").value=name;

    document.getElementById("consultationFee").value="";
    document.getElementById("discount").value="";

    document.getElementById("invoiceModal").style.display="block";

    fetch("/drugs")
    .then(res=>res.json())
    .then(data=>{

        allDrugs=data;

      //  displayDrugs(data);

    document.getElementById("drugResults").innerHTML = "";
        renderInvoice();

    });

}

function closeInvoice(){

    document.getElementById("invoiceModal").style.display="none";

}

function filterDrugs(){
    let txt =
        document.getElementById("drugSearch")
        .value
        .trim()
        .toLowerCase();

    if(txt === ""){
        document.getElementById("drugResults").innerHTML = "";
        return;
    }

    let filtered =
        allDrugs.filter(d =>
            d.name.toLowerCase().includes(txt)
        );

    displayDrugs(filtered);

function displayDrugs(drugs){

    let html="";

    drugs.forEach(d=>{

        html += `
        <div onclick="addDrug(${d.id})">

            ${d.name}
            -
            Stock: ${d.quantity}
            -
           Price: $${d.price}

        </div>
        `;

    });

    document.getElementById("drugResults")
    .innerHTML=html;

}

function addDrug(id){

    let drug =
    allDrugs.find(d=>d.id==id);

    if(!drug) return;

    let exists =
    invoiceItems.find(i=>i.id==id);

    if(exists) return;

    invoiceItems.push({

        id:drug.id,
        name:drug.name,
        price:drug.price,
        stock:drug.quantity,
        qty:1

    });

    renderInvoice();

}


function renderInvoice(){

    let html=`
    <tr>
        <th>Drug</th>
       
        <th>Quantity</th>
      
        <th>Remove</th>
    </tr>
    `;

    let drugsTotal=0;

    invoiceItems.forEach((item,index)=>{

        let lineTotal =
        item.price * item.qty;

        drugsTotal += lineTotal;

        html += `
        <tr>

        <td>${item.name}</td>

      

        <td>

        <input
        type="number"
        min="1"
        max="${item.stock}"
        value="${item.qty}"
        onchange="changeQty(${index},this.value)">

        </td>

       

        <td>

        <button
        onclick="removeDrug(${index})">

        X

        </button>

        </td>

        </tr>
        `;
    });

    document.getElementById(
        "invoiceTable"
    ).innerHTML=html;

    let consultation =
    Number(
        document.getElementById(
            "consultationFee"
        ).value
    ) || 0;

    let discount =
    Number(
        document.getElementById(
            "discount"
        ).value
    ) || 0;

    let total =
    drugsTotal +
    consultation -
    discount;

    document.getElementById(
        "drugsTotal"
    ).innerHTML =
    "Drugs Total: $" +
    drugsTotal.toFixed(2);

    document.getElementById(
        "grandTotal"
    ).innerHTML =
    "Total: $" +
    total.toFixed(2);

}

function changeQty(index,value){

    value = Number(value);

    if(value < 1){
        value = 1;
    }

    if(value > invoiceItems[index].stock){
/*
        alert(
        "Cannot exceed stock"
        );
*/
     /*   value =
        invoiceItems[index].stock;
*/
    }

    invoiceItems[index].qty =
    value;

    renderInvoice();

}

function removeDrug(index){

    invoiceItems.splice(index,1);

    renderInvoice();

}

function validateStock(){

    for(let item of invoiceItems){

        if(item.qty > item.stock){
            alert(
                "Not enough stock for " +
                item.name +
                " (max: " +
                item.stock +
                ")"
            );

            return false;
        }

    }

    return true;
}

async function generatePDF(){

    console.log("Generate PDF clicked");

    // ===== STOCK VALIDATION FIRST =====
    if(!validateStock()){
        return;
    }

    const ok = confirm("Generate invoice and update stock?");
    if(!ok){
        return;
    }

    // ===== UPDATE STOCK =====
    const response = await fetch("/deductStock", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items: invoiceItems })
    });

    if(!response.ok){
        alert(await response.text());
        return;
    }

    // ===== CHECK JSPDF =====
    if(!window.jspdf){
        alert("jsPDF is not loaded!");
        return;
    }

    const pdf = new window.jspdf.jsPDF();

    const pageWidth = pdf.internal.pageSize.getWidth();

    // ===== INVOICE NUMBER =====
    const invoiceNumber = "INV-" + generateInvoiceNumber();

    // ===== TITLE =====
    pdf.setFontSize(24);
    pdf.setFont("helvetica", "bold");

    pdf.text(
        "Dr Elias Karaan Consultation Invoice",
        pageWidth / 2,
        15,
        { align: "center" }
    );

    pdf.line(20, 18, pageWidth - 20, 18);

    // ===== DATE (RIGHT) =====
    const formattedDate = new Date().toLocaleDateString("en-GB");

    pdf.setFontSize(11);
    pdf.setFont("helvetica", "normal");

    pdf.text(
        "Date: " + formattedDate,
        pageWidth - 20,
        25,
        { align: "right" }
    );

    // ===== INVOICE NUMBER =====
    pdf.text("Invoice #: " + invoiceNumber, 20, 25);

    // ===== PATIENT =====
    pdf.setFontSize(13);
    pdf.setFont("helvetica", "bold");

    pdf.text(
        "Patient: " + selectedPatientName,
        20,
        35
    );

    // ===== CALCULATE =====
    let drugsTotal = 0;

    const tableData = invoiceItems.map(item => {

        const total = item.price * item.qty;
        drugsTotal += total;

        return [
            item.name,
            item.qty,
            `$${Number(item.price).toFixed(2)}`,
            `$${total.toFixed(2)}`
        ];
    });

    // ===== TOTAL ROW =====
    tableData.push([
        {
            content: "Drugs Total",
            colSpan: 3,
            styles: {
                halign: "right",
                fontStyle: "bold"
            }
        },
        `$${drugsTotal.toFixed(2)}`
    ]);

    // ===== TABLE =====
    pdf.autoTable({
        startY: 45,
        head: [["Drug", "Quantity", "Price", "Total"]],
        body: tableData,
        theme: "grid",
        headStyles: {
            fillColor: [30, 60, 114],
            textColor: 255,
            fontStyle: "bold"
        },
        styles: {
            fontSize: 11,
            cellPadding: 3
        }
    });

    // ===== FINAL TOTALS =====
    let y = pdf.lastAutoTable.finalY + 10;

    const consultation =
        Number(document.getElementById("consultationFee").value) || 0;

    const discount =
        Number(document.getElementById("discount").value) || 0;

    pdf.setFontSize(11);
    pdf.setFont("helvetica", "normal");

    pdf.text(`Consultation: $${consultation.toFixed(2)}`, 20, y);
    y += 7;

    pdf.text(`Discount: $${discount.toFixed(2)}`, 20, y);
    y += 10;

    pdf.setFontSize(14);
    pdf.setFont("helvetica", "bold");

    pdf.text(
        `TOTAL: $${(drugsTotal + consultation - discount).toFixed(2)}`,
        20,
        y
    );

    // ===== SAFE PRINT =====
    const blob = pdf.output("blob");
    const url = URL.createObjectURL(blob);

    const printWindow = window.open(url);

    if(printWindow){
        printWindow.onload = () => printWindow.print();
    }

    // ===== DOWNLOAD =====
    pdf.save(invoiceNumber + ".pdf");

    closeInvoice();
}

    function generateInvoiceNumber() {
    const now = new Date();

    const dd = String(now.getDate()).padStart(2, '0');
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const yy = String(now.getFullYear()).slice(-2);

    const hh = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');

  //  const ms = String(now.getMilliseconds()).padStart(3, '0');

    return `${dd}${mm}${yy}${hh}${min}${ss}`;
}
