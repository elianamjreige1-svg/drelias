.stock-toggle{

.modal{

#drugResults div{

#drugResults div:hover{

.container{

    margin:auto;
}

section{
    margin-bottom:25px;
}

input{
    width:90%;

    padding:12px;
    margin:5px;

    border-radius:6px;
    font-size:16px;
}

button{
    padding:12px 16px;
    margin:5px;
    border:none;
    border-radius:6px;

    background:#4CAF50;
    color:white;

button:hover{

.deleteBtn{

}

.table-container{

table{

th,td{

table td input{

.filters{

.action-buttons{
    display:flex;
    flex-direction:row;
    flex-wrap:nowrap;
    gap:4px;

.action-buttons button{
    white-space:nowrap;
    padding:6px 8px;
    font-size:12px;
    margin:0;

.filters input{
    flex:1;

h1,h2{

<script>

let allDrugs = [];
let invoiceItems = [];
let selectedPatientName = "";
    
let allPatients = [];


    
function renderPatients(data){

 if(!data || data.length === 0){
        document.getElementById("patients").innerHTML = "";
        return;
    }
    
    let html = `
    <tr>
        <th>Patient Number</th>
        <th>Patient Name</th>
        <th>DOB</th>
        <th>Telephone</th>
        <th>Actions</th>
    </tr>
    `;

    data.forEach(p => {

        html += `
        <tr>

            <td>${p.id}</td>

            <td>
                <input id="name${p.id}" value="${p.name}">
            </td>

            <td>
                <input id="dob${p.id}" value="${p.dob}">
            </td>

            <td>
                <input id="tel${p.id}" value="${p.tel}">
            </td>

           <td>
    <div class="action-buttons">
        <button onclick="drugandinvoice(${p.id},'${p.name}')" style="background:black">Drug & Invoice</button>
        <button onclick="updatePatient(${p.id})">Save Info</button>
        <button class="deleteBtn" onclick="deletePatient(${p.id})">Delete</button>
    </div>
</td>

        </tr>
        `;
    });

    document.getElementById("patients").innerHTML = html;
}

function loadPatients(){

    fetch("/patients")
    .then(res => res.json())
    .then(data => {

        allPatients = data;

        renderPatients(data);

    });
}

function addPatient(){
if(document.getElementById("name").value=="" || document.getElementById("dob").value=="" || document.getElementById("tel").value==""){
    alert("Please fill all the fields");
    return;
}
    if(confirm("Add this patient?")){

        fetch("/patients",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:document.getElementById("name").value,

                dob:document.getElementById("dob").value,

                tel:document.getElementById("tel").value

            })

        })
        .then(() => {

            document.getElementById("name").value = "";
            document.getElementById("dob").value = "";
            document.getElementById("tel").value = "";

            loadPatients();

        });

    }

}

function updatePatient(id){

    if(confirm("Update this patient?")){

        fetch("/patients/"+id,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:document.getElementById("name"+id).value,

                dob:document.getElementById("dob"+id).value,

                tel:document.getElementById("tel"+id).value

            })

        })
        .then(loadPatients);

    }

}

function deletePatient(id){

    if(confirm("Delete this patient?")){

        fetch("/patients/"+id,{
            method:"DELETE"
        })
        .then(loadPatients);

    }

}

function filterPatients(){

    let value = document.getElementById("searchAll").value.toLowerCase();

    let filtered = allPatients.filter(p => {

        return (
            p.id.toString().includes(value) ||
            (p.name || "").toLowerCase().includes(value) ||
            (p.dob || "").toLowerCase().includes(value) ||
            (p.tel || "").toString().includes(value)
        );

    });

    renderPatients(filtered);
}

loadPatients();

function displayDrugs(drugs){

    let html="";

    drugs.forEach(d=>{

        html += `
        <div onclick="addDrug(${d.id})">

            ${d.name}
            -
            Stock: ${d.quantity}
            -
           Price: $${d.price}

        </div>
        `;

    });

    document.getElementById("drugResults")
    .innerHTML=html;

}

function addDrug(id){

    let drug =
    allDrugs.find(d=>d.id==id);

    if(!drug) return;

if(drug.quantity <= 0){
    alert(`Cannot add ${drug.name}. Stock is 0!`);
    return;
}
    
    let exists =
    invoiceItems.find(i=>i.id==id);

    if(exists) return;

    invoiceItems.push({

        id:drug.id,
        name:drug.name,
        price:drug.price,
        stock:drug.quantity,
        qty:1

    });
  document.getElementById("donot").style.display=""; 
    renderInvoice();

}


function renderInvoice(){

    let html=`
    <tr>
        <th>Drug</th>
       
        <th>Quantity</th>
      
        <th>Action</th>
    </tr>
    `;

    let drugsTotal=0;

    invoiceItems.forEach((item,index)=>{

        let lineTotal =
        item.price * item.qty;

        drugsTotal += lineTotal;

        html += `
        <tr>

        <td>${item.name}</td>

      

        <td>

        <input
        type="number"
        min="1"
        max="${item.stock}"
        value="${item.qty}"
        onchange="changeQty(${index},this.value)">

        </td>

       

        <td>

        <button
        onclick="removeDrug(${index})">
        Remove
        </button>

        </td>

        </tr>
        `;
    });

    document.getElementById(
        "invoiceTable"
    ).innerHTML=html;

    let consultation =
    Number(
        document.getElementById(
            "consultationFee"
        ).value
    ) || 0;

    let discount =
    Number(
        document.getElementById(
            "discount"
        ).value
    ) || 0;

    let total =
    drugsTotal +
    consultation -
    discount;

    document.getElementById(
        "drugsTotal"
    ).innerHTML =
    "Drugs Total: $" +
    drugsTotal.toFixed(2);

    document.getElementById(
        "grandTotal"
    ).innerHTML =
    "Total: $" +
    total.toFixed(2);

}

function changeQty(index,value){

    value = Number(value);

    if(value < 1){
        value = 1;
    }

    if(value > invoiceItems[index].stock){
/*
        alert(
        "Cannot exceed stock"
        );
*/
     /*   value =
        invoiceItems[index].stock;
*/
    }

    invoiceItems[index].qty =
    value;

    renderInvoice();

}

function resetInvoiceModal(){

    // checkbox reset
    document.getElementById("skipStockCheck").checked = false;

    // search reset
    document.getElementById("drugSearch").value = "";

    // clear drug results
    document.getElementById("drugResults").innerHTML = "";

    // reset invoice data
    invoiceItems = [];

    // reset table + totals
    document.getElementById("invoiceTable").innerHTML = "";
    document.getElementById("drugsTotal").innerHTML = "Drugs Total: 0";
    document.getElementById("grandTotal").innerHTML = "Total: 0";
}
    
function removeDrug(index){

    invoiceItems.splice(index,1);

      let dt = 0;
    invoiceItems.forEach(item => {
        dt += item.price * item.qty;
    });

    if(dt>0) document.getElementById("donot").style.display="";
    else
      document.getElementById("donot").style.display="none";  
    renderInvoice();

}

function validateStock(){

    for(let item of invoiceItems){

        if(item.qty > item.stock){
            alert(
                "Not enough stock for " +
                item.name +
                " (max: " +
                item.stock +
                ")"
            );

            return false;
        }

    }

    return true;
}

    const printWindow = window.open(url);

    if(printWindow){
        printWindow.onload = () => printWindow.print();
    }

    // ===== DOWNLOAD =====
    pdf.save(invoiceNumber + ".pdf");
     document.getElementById("donot").style.display="none";
closeInvoiceDirect();
  //  closeInvoice();
}

    function generateInvoiceNumber() {
    const now = new Date();

    const dd = String(now.getDate()).padStart(2, '0');
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const yy = String(now.getFullYear()).slice(-2);

    const hh = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');

  //  const ms = String(now.getMilliseconds()).padStart(3, '0');

    return `${dd}${mm}${yy}${hh}${min}${ss}`;
}

// create one fake history state
history.pushState(null,"",location.href);

let leaving = false;

window.addEventListener("popstate", function(){

    if(leaving) return;

    const leave = confirm("Are you sure you want to exit the app ?");

    if(leave){

        leaving = true;

        // clear saved login
        localStorage.removeItem("username");
        localStorage.removeItem("password");
        localStorage.removeItem("autoLogin");

        window.onbeforeunload = null;

        history.back();

    }else{

        history.pushState(null,"",location.href);
    }
});

window.onbeforeunload = function(e){

    if(!leaving){
        e.preventDefault();
        e.returnValue = '';
    }
};
function closeInvoiceDirect(){
    resetInvoiceModal();
    document.getElementById("invoiceModal").style.display = "none";
}
