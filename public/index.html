
<!DOCTYPE html>
<html>
<head>
<title>Patients Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial;
    background:#1e3c72;
    margin:0;
    padding:10px;
    color:white;
}

.modalContent{
    width:95%;
    max-width:900px;
    margin:20px auto;
    padding:15px;
    box-sizing:border-box;
    overflow-x:auto;
}

.modalContent input{
    width:100%;
    box-sizing:border-box;
}

#invoiceTable{
    width:100%;
    min-width:600px;
}

#invoiceTable input[type="number"]{
    width:70px;
    min-width:70px;
}
    
    
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
    overflow:auto;
}

.modalContent{
    background:white;
    color:black;
    max-width:900px;
    margin:20px auto;
    padding:20px;
}

#drugResults div{
    background:#eee;
    margin:3px;
    padding:8px;
    cursor:pointer;
}

#drugResults div:hover{
    background:#ddd;
}
    
.container{
    max-width:1200px;
    margin:auto;
}

section{
    margin-bottom:25px;
}

input{
    width:90%;
    max-width:300px;
    padding:12px;
    margin:5px;
    border:none;
    border-radius:6px;
    font-size:16px;
}

button{
    padding:12px 16px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    background:#4CAF50;
    color:white;
}

button:hover{
    opacity:0.9;
}

.deleteBtn{
    background:#e53935;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:800px;
    background:white;
    color:black;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

td input{
    width:95%;
    padding:8px;
    margin:0;
}

.filters{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:10px;
}
.action-buttons{
    display:flex;
    flex-direction:row;
    flex-wrap:nowrap;
    gap:4px;
    justify-content:center;
}

.action-buttons button{
    white-space:nowrap;
    padding:6px 8px;
    font-size:12px;
    margin:0;
}
.filters input{
    flex:1;
    min-width:150px;
}

h1,h2{
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Dr Elias القرعان Patients</h1>

<section>

<h2>Add Patient</h2>

<input id="name" placeholder="Patient Name">

<input id="dob" placeholder="Date Of Birth">

<input id="tel" placeholder="Telephone Number" type="number">

<br>

<button onclick="addPatient()">Add Patient</button>

</section>

<section>

<h2>Patients List</h2>

<div class="filters">
<input id="searchAll"
placeholder="Search using number, name, dob, telephone"
onkeyup="filterPatients()">



</div>

<div class="table-container">

<table id="patients"></table>

</div>

</section>

</div>

<script>

let allDrugs = [];
let invoiceItems = [];
let selectedPatientName = "";
    
let allPatients = [];

function renderPatients(data){

    let html = `
    <tr>
        <th>Patient Number</th>
        <th>Patient Name</th>
        <th>DOB</th>
        <th>Telephone</th>
        <th>Actions</th>
    </tr>
    `;

    data.forEach(p => {

        html += `
        <tr>

            <td>${p.id}</td>

            <td>
                <input id="name${p.id}" value="${p.name}">
            </td>

            <td>
                <input id="dob${p.id}" value="${p.dob}">
            </td>

            <td>
                <input id="tel${p.id}" value="${p.tel}">
            </td>

           <td>
    <div class="action-buttons">
        <button onclick="drugandinvoice(${p.id},'${p.name}')" style="background:black">Drug & Invoice</button>
        <button onclick="updatePatient(${p.id})">Save Info</button>
        <button class="deleteBtn" onclick="deletePatient(${p.id})">Delete</button>
    </div>
</td>

        </tr>
        `;
    });

    document.getElementById("patients").innerHTML = html;
}

function loadPatients(){

    fetch("/patients")
    .then(res => res.json())
    .then(data => {

        allPatients = data;

        renderPatients(data);

    });
}

function addPatient(){
if(document.getElementById("name").value=="" || document.getElementById("dob").value=="" || document.getElementById("tel").value==""){
    alert("Please fill all the fields");
    return;
}
    if(confirm("Add this patient?")){

        fetch("/patients",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:document.getElementById("name").value,

                dob:document.getElementById("dob").value,

                tel:document.getElementById("tel").value

            })

        })
        .then(() => {

            document.getElementById("name").value = "";
            document.getElementById("dob").value = "";
            document.getElementById("tel").value = "";

            loadPatients();

        });

    }

}


function drugandinvoice(id){
/*
    if(confirm("Update this patient?")){

        fetch("/patients/"+id,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:document.getElementById("name"+id).value,

                dob:document.getElementById("dob"+id).value,

                tel:document.getElementById("tel"+id).value

            })

        })
        .then(loadPatients);

    }
*/
}
    
function updatePatient(id){

    if(confirm("Update this patient?")){

        fetch("/patients/"+id,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:document.getElementById("name"+id).value,

                dob:document.getElementById("dob"+id).value,

                tel:document.getElementById("tel"+id).value

            })

        })
        .then(loadPatients);

    }

}

function deletePatient(id){

    if(confirm("Delete this patient?")){

        fetch("/patients/"+id,{
            method:"DELETE"
        })
        .then(loadPatients);

    }

}

function filterPatients(){

    let value = document.getElementById("searchAll").value.toLowerCase();

    let filtered = allPatients.filter(p => {

        return (
            p.id.toString().includes(value) ||
            (p.name || "").toLowerCase().includes(value) ||
            (p.dob || "").toLowerCase().includes(value) ||
            (p.tel || "").toString().includes(value)
        );

    });

    renderPatients(filtered);
}

loadPatients();


    function drugandinvoice(id,name){

    selectedPatientName = name;

    invoiceItems = [];

    document.getElementById("invoicePatient").value=name;

    document.getElementById("consultationFee").value="";
    document.getElementById("discount").value="";

    document.getElementById("invoiceModal").style.display="block";

    fetch("/drugs")
    .then(res=>res.json())
    .then(data=>{

        allDrugs=data;

        displayDrugs(data);

        renderInvoice();

    });

}

function closeInvoice(){

    document.getElementById("invoiceModal").style.display="none";

}

function filterDrugs(){

    let txt =
    document.getElementById("drugSearch")
    .value
    .toLowerCase();

    let filtered =
    allDrugs.filter(d=>
        d.name.toLowerCase().includes(txt)
    );

    displayDrugs(filtered);

}

function displayDrugs(drugs){

    let html="";

    drugs.forEach(d=>{

        html += `
        <div onclick="addDrug(${d.id})">

            ${d.name}
            -
            Stock: ${d.quantity}
            -
            $${d.price}

        </div>
        `;

    });

    document.getElementById("drugResults")
    .innerHTML=html;

}

function addDrug(id){

    let drug =
    allDrugs.find(d=>d.id==id);

    if(!drug) return;

    let exists =
    invoiceItems.find(i=>i.id==id);

    if(exists) return;

    invoiceItems.push({

        id:drug.id,
        name:drug.name,
        price:drug.price,
        stock:drug.quantity,
        qty:1

    });

    renderInvoice();

}


function renderInvoice(){

    let html=`
    <tr>
        <th>Drug</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Qty</th>
        <th>Total</th>
        <th></th>
    </tr>
    `;

    let drugsTotal=0;

    invoiceItems.forEach((item,index)=>{

        let lineTotal =
        item.price * item.qty;

        drugsTotal += lineTotal;

        html += `
        <tr>

        <td>${item.name}</td>

        <td>${item.price}</td>

        <td>${item.stock}</td>

        <td>

        <input
        type="number"
        min="1"
        max="${item.stock}"
        value="${item.qty}"
        onchange="changeQty(${index},this.value)">

        </td>

        <td>${lineTotal}</td>

        <td>

        <button
        onclick="removeDrug(${index})">

        X

        </button>

        </td>

        </tr>
        `;
    });

    document.getElementById(
        "invoiceTable"
    ).innerHTML=html;

    let consultation =
    Number(
        document.getElementById(
            "consultationFee"
        ).value
    ) || 0;

    let discount =
    Number(
        document.getElementById(
            "discount"
        ).value
    ) || 0;

    let total =
    drugsTotal +
    consultation -
    discount;

    document.getElementById(
        "drugsTotal"
    ).innerHTML =
    "Drugs Total: $" +
    drugsTotal.toFixed(2);

    document.getElementById(
        "grandTotal"
    ).innerHTML =
    "Total: $" +
    total.toFixed(2);

}

function changeQty(index,value){

    value = Number(value);

    if(value < 1){
        value = 1;
    }

    if(value > invoiceItems[index].stock){

        alert(
        "Cannot exceed stock"
        );

        value =
        invoiceItems[index].stock;

    }

    invoiceItems[index].qty =
    value;

    renderInvoice();

}

function removeDrug(index){

    invoiceItems.splice(index,1);

    renderInvoice();

}


    async function generatePDF(){

    const consultation =
    Number(
        document.getElementById(
            "consultationFee"
        ).value
    ) || 0;

    const discount =
    Number(
        document.getElementById(
            "discount"
        ).value
    ) || 0;

    const response =
    await fetch(
        "/deductStock",
        {
            method:"POST",
            headers:{
                "Content-Type":
                "application/json"
            },
            body:JSON.stringify({
                items:invoiceItems
            })
        }
    );

    if(!response.ok){

        alert(
        await response.text()
        );

        return;
    }

    const { jsPDF } =
    window.jspdf;

    const pdf =
    new jsPDF();

    let y=20;

    pdf.setFontSize(18);
    pdf.text(
        "Dr Elias Invoice",
        20,
        y
    );

    y += 15;

    pdf.setFontSize(12);

    pdf.text(
        "Patient: "+
        selectedPatientName,
        20,
        y
    );

    y += 15;

    let drugsTotal=0;

    invoiceItems.forEach(item=>{

        let total =
        item.price *
        item.qty;

        drugsTotal += total;

        pdf.text(
            `${item.name}
             x${item.qty}
             = $${total}`,
            20,
            y
        );

        y += 10;

    });

    y += 10;

    pdf.text(
        "Drugs Total: $"+
        drugsTotal.toFixed(2),
        20,
        y
    );

    y += 10;

    pdf.text(
        "Consultation: $"+
        consultation.toFixed(2),
        20,
        y
    );

    y += 10;

    pdf.text(
        "Discount: $"+
        discount.toFixed(2),
        20,
        y
    );

    y += 10;

    pdf.text(
        "Total: $"+
        (
            drugsTotal+
            consultation-
            discount
        ).toFixed(2),
        20,
        y
    );

    pdf.save(
        "invoice.pdf"
    );

    closeInvoice();

}
    
    
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<div id="invoiceModal" class="modal">

<div class="modalContent">

<h2>Patient Invoice</h2>

<input id="invoicePatient" readonly>

<input id="consultationFee"
       type="number"
       placeholder="Consultation Fee"
       oninput="renderInvoice()">

<input id="discount"
       type="number"
       placeholder="Discount"
       oninput="renderInvoice()">

<hr>

<input id="drugSearch"
       placeholder="Search Drug"
       onkeyup="filterDrugs()">

<div id="drugResults"></div>

<hr>

<table id="invoiceTable"></table>

<h3 id="drugsTotal">Drugs Total: 0</h3>
<h3 id="grandTotal">Total: 0</h3>

<button onclick="generatePDF()">
Generate PDF
</button>

<button onclick="closeInvoice()">
Close
</button>

</div>

</div>
</body>
</html>
